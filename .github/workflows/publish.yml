name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI after checks"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
    - name: Run tests
      run: python -m pytest -q tests

  build:
    needs: tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build package
      run: python -m build
    - name: Check package metadata
      run: twine check dist/*
    - name: Upload dist artifacts
      uses: actions/upload-artifact@v5
      with:
        name: dist
        path: dist/*

  verify-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Download dist artifacts
      uses: actions/download-artifact@v5
      with:
        name: dist
        path: dist
    - name: Install wheel
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python - <<'PY'
        from pathlib import Path
        import subprocess
        import sys

        wheels = sorted(Path('dist').glob('openiso-*.whl'))
        if not wheels:
            raise SystemExit('No openiso wheel found in dist/')

        subprocess.check_call([sys.executable, '-m', 'pip', 'install', str(wheels[0])])
        PY
    - name: Smoke import
      shell: bash
      run: |
        python -c "import openiso; print(openiso.__version__)"

  publish:
    needs: [build, verify-install]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    runs-on: ubuntu-latest
    environment: pypi
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v5
      with:
        name: dist
        path: dist
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
